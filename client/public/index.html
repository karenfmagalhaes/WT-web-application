<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendar Web App</title>
    <style>
      :root {
        color-scheme: light;
        --bg: linear-gradient(135deg, #f2f7fb 0%, #fffaf2 100%);
        --surface: rgba(255, 255, 255, 0.88);
        --surface-strong: #ffffff;
        --border: rgba(18, 37, 58, 0.12);
        --text: #12253a;
        --muted: #5b7088;
        --accent: #ff6f61;
        --accent-soft: rgba(255, 111, 97, 0.12);
        --mint: #6fd3c1;
        --shadow: 0 20px 45px rgba(18, 37, 58, 0.08);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      .app-shell {
        min-height: 100vh;
      }

      .page-shell {
        width: min(1120px, calc(100% - 2rem));
        margin: 0 auto;
        padding: 1.5rem 0 3rem;
      }

      .panel {
        background: var(--surface);
        backdrop-filter: blur(16px);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: var(--shadow);
      }

      .navbar {
        position: sticky;
        top: 0;
        z-index: 10;
        background: rgba(242, 247, 251, 0.78);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--border);
      }

      .navbar__inner {
        width: min(1120px, calc(100% - 2rem));
        margin: 0 auto;
        padding: 1rem 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .navbar__brand {
        font-size: 1.15rem;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .navbar__links {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        color: var(--muted);
      }

      .btn {
        border: 0;
        border-radius: 999px;
        padding: 0.7rem 1rem;
        cursor: pointer;
        transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .btn--primary {
        background: var(--accent);
        color: #fff;
        box-shadow: 0 12px 24px rgba(255, 111, 97, 0.22);
      }

      .btn--secondary {
        background: #fff;
        color: var(--text);
        border: 1px solid var(--border);
      }

      .btn--ghost {
        background: transparent;
        color: var(--muted);
      }

      .btn--danger {
        background: #fce6e1;
        color: #b23f35;
      }

      .btn--small {
        padding: 0.5rem 0.8rem;
        font-size: 0.92rem;
      }

      .auth-grid {
        min-height: calc(100vh - 88px);
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1.5rem;
        align-items: center;
      }

      .auth-card,
      .calendar-card {
        padding: 1.5rem;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        padding: 0.3rem 0.7rem;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .title {
        margin: 0.8rem 0 0.5rem;
        font-size: clamp(2rem, 4vw, 3.3rem);
        line-height: 1;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .form {
        display: grid;
        gap: 1rem;
      }

      .form__row {
        display: grid;
        gap: 0.45rem;
      }

      .form__split {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
      }

      .form__label {
        font-size: 0.92rem;
        color: var(--muted);
      }

      .input,
      .textarea,
      .select {
        width: 100%;
        padding: 0.85rem 1rem;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.86);
        color: var(--text);
      }

      .textarea {
        min-height: 110px;
        resize: vertical;
      }

      .calendar-layout {
        display: grid;
        gap: 1rem;
      }

      .calendar-header {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 1rem;
        align-items: center;
      }

      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 0.75rem;
      }

      .day-cell {
        min-height: 140px;
        padding: 0.8rem;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.72);
        display: grid;
        gap: 0.75rem;
        align-content: start;
      }

      .day-cell--muted {
        opacity: 0.55;
      }

      .day-cell__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }

      .day-cell__number {
        width: 2rem;
        height: 2rem;
        display: inline-grid;
        place-items: center;
        border-radius: 999px;
        background: rgba(111, 211, 193, 0.18);
        font-weight: 700;
      }

      .event-list {
        display: grid;
        gap: 0.5rem;
      }

      .event-chip {
        width: 100%;
        text-align: left;
        border: 1px solid rgba(255, 111, 97, 0.18);
        border-radius: 14px;
        background: rgba(255, 111, 97, 0.08);
        color: var(--text);
        padding: 0.65rem 0.75rem;
        cursor: pointer;
      }

      .event-chip__time {
        display: block;
        color: var(--accent);
        font-size: 0.82rem;
        margin-bottom: 0.2rem;
      }

      .calendar-toolbar,
      .view-switch {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .week-header {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 0.75rem;
        margin-bottom: 0.75rem;
      }

      .week-label {
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--muted);
        text-align: center;
      }

      .day-view {
        display: grid;
        gap: 1rem;
      }

      .empty-state {
        padding: 1rem;
        border-radius: 20px;
        background: rgba(111, 211, 193, 0.12);
        color: var(--muted);
      }

      .spinner {
        width: 2.2rem;
        height: 2.2rem;
        border-radius: 999px;
        border: 4px solid rgba(18, 37, 58, 0.12);
        border-top-color: var(--accent);
        animation: spin 0.9s linear infinite;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(18, 37, 58, 0.35);
        display: grid;
        place-items: center;
        padding: 1rem;
        z-index: 100;
      }

      .modal-panel {
        width: min(560px, 100%);
        background: var(--surface-strong);
        border-radius: 28px;
        padding: 1.5rem;
        box-shadow: var(--shadow);
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1rem;
      }

      .stack {
        display: grid;
        gap: 1rem;
      }

      .muted {
        color: var(--muted);
      }

      .alert {
        padding: 0.9rem 1rem;
        border-radius: 16px;
        border: 1px solid rgba(178, 63, 53, 0.18);
        background: rgba(252, 230, 225, 0.7);
        color: #b23f35;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 860px) {
        .auth-grid {
          grid-template-columns: 1fr;
        }

        .calendar-grid,
        .week-header {
          grid-template-columns: 1fr;
        }

        .form__split {
          grid-template-columns: 1fr;
        }

        .day-cell {
          min-height: auto;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="../src/main.jsx"></script>
  </body>
</html>
